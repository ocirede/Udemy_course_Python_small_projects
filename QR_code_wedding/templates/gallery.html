<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Galeria de Fotos</title>
    <link rel="stylesheet" href="/static/css/styles_gallery.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="/static/images/AM.jpg" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="gallery_body">

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox hidden">
    <span class="close">&times;</span>
    <img id="lightbox-img">
    <a id="download-btn" download>
        <i class="fas fa-download"></i>
    </a>
</div>

<!-- MULTIPLE DOWNLOAD BUTTON -->
<button id="download-multiple" title="Download Selected">
    <i class="fas fa-download"></i>
</button>

<!-- GALLERY -->
<div class="gallery" id="gallery">
    {% for item in gallery_pics %}
    <div class="gallery-item {% if item.type == 'video' %}video{% else %}image{% endif %}">

        {% if item.type == "video" %}
            <video controls preload="metadata">
                <source src="{{ item.url }}" type="video/mp4">
            </video>
        {% else %}
            <img class="lazy"
                 data-src="{{ item.url }}"
                 data-full="{{ item.url }}"
                 alt="Wedding photo">
        {% endif %}

        <input type="checkbox" class="select-img">
    </div>
    {% endfor %}
</div>

<!-- LOADING -->
<div id="loading-indicator">
    <i class="fas fa-spinner fa-spin"></i>
    {% if language == 'it' %}Caricando foto...{% else %}Cargando fotos...{% endif %}
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const gallery = document.getElementById("gallery");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const downloadBtn = document.getElementById("download-btn");
    const closeBtn = document.querySelector(".lightbox .close");
    const downloadMultipleBtn = document.getElementById("download-multiple");
    const loadingIndicator = document.getElementById("loading-indicator");

    let images = [];
    let currentIndex = 0;
    let nextCursor = "{{ next_cursor }}";
    let loading = false;
    let lastTap = 0;

    // ======================
    // LAZY LOAD
    // ======================
    const lazyObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if(entry.isIntersecting){
                const img = entry.target;
                img.src = img.dataset.src;
                img.classList.remove("lazy");
                lazyObserver.unobserve(img);
            }
        });
    });
    document.querySelectorAll(".gallery-item img.lazy").forEach(img => lazyObserver.observe(img));

    // ======================
    // FIX LAST ODD IMAGE
    // ======================
    function fixLastImage() {
    const items = document.querySelectorAll('.gallery-item');

    // Reset all images
    document.querySelectorAll('.gallery-item.image').forEach(item => {
        item.style.gridColumn = '';
        item.style.paddingTop = '';
    });

    let imageCount = 0;
    items.forEach((item, index) => {
        if (item.classList.contains('image')) {
            imageCount++;
        } else if (item.classList.contains('video')) {
            // Check if the image before this video is alone (odd count)
            if (imageCount % 2 !== 0) {
                // Find the last image before this video
                let prev = item.previousElementSibling;
                while (prev && !prev.classList.contains('image')) {
                    prev = prev.previousElementSibling;
                }
                if (prev) {
                    prev.style.gridColumn = '1 / -1';
                    prev.style.paddingTop = '56.25%';
                }
            }
            imageCount = 0; // reset count after each video
        }
    });

    // Handle remaining images after last video
    if (imageCount % 2 !== 0) {
        const allImages = document.querySelectorAll('.gallery-item.image');
        const last = allImages[allImages.length - 1];
        last.style.gridColumn = '1 / -1';
        last.style.paddingTop = '56.25%';
    }
}

    fixLastImage();

    // ======================
    // REFRESH IMAGE ARRAY
    // ======================
    function refreshImages() {
        images = Array.from(document.querySelectorAll(".gallery-item img"))
                      .map(img => img.dataset.full);
    }

    // ======================
    // SHOW LIGHTBOX
    // ======================
    function showModalImage() {
        lightboxImg.src = images[currentIndex];
        const url = encodeURIComponent(images[currentIndex]);
        const filename = images[currentIndex].split("/").pop();
        downloadBtn.href = `/download?url=${url}`;
        downloadBtn.setAttribute("download", filename);
    }

    function closeLightbox() {
        lightbox.classList.add("hidden");
        lightboxImg.src = "";
        document.body.style.overflow = "";
    }

    closeBtn.onclick = closeLightbox;
    lightbox.addEventListener("click", e => { if(e.target === lightbox) closeLightbox(); });

    // ======================
    // MODAL SWIPE
    // ======================
    let touchStartX = 0;
    let touchEndX = 0;
    let touchStartY = 0;
    let touchEndY = 0;
    let isPinching = false;

    lightbox.addEventListener("touchstart", e => {
        if (e.touches.length > 1) {
            isPinching = true;
            return;
        }
        isPinching = false;
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    });

    lightbox.addEventListener("touchend", e => {
        if (isPinching) {
            isPinching = false;
            return;
        }
        touchEndX = e.changedTouches[0].screenX;
        touchEndY = e.changedTouches[0].screenY;

        const deltaX = touchStartX - touchEndX;
        const deltaY = Math.abs(touchStartY - touchEndY);

        // Ignore if more vertical than horizontal (scrolling)
        if (deltaY > Math.abs(deltaX)) return;

        if (Math.abs(deltaX) > 50) {
            if (deltaX > 0) {
                currentIndex = (currentIndex + 1) % images.length;
            } else {
                currentIndex = (currentIndex - 1 + images.length) % images.length;
            }
            showModalImage();
        }
    });

    // Keyboard navigation
    document.addEventListener("keydown", e => {
        if(lightbox.classList.contains("hidden")) return;
        if(e.key === "ArrowRight"){
            currentIndex = (currentIndex + 1) % images.length;
            showModalImage();
        } else if(e.key === "ArrowLeft"){
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            showModalImage();
        } else if(e.key === "Escape"){
            closeLightbox();
        }
    });

    // ======================
    // GALLERY CLICK & SELECTION
    // ======================
    function bindGalleryItem(wrapper) {
        const img = wrapper.querySelector("img");

        wrapper.addEventListener("click", () => {
            const now = Date.now();
            const tapGap = now - lastTap;
            lastTap = now;

            if (tapGap < 300) {
                wrapper.classList.remove("selected");
                refreshImages();
                currentIndex = images.indexOf(img.dataset.full);
                showModalImage();
                lightbox.classList.remove("hidden");
                document.body.style.overflow = "hidden";
                downloadMultipleBtn.style.display = "none";
                return;
            }

            wrapper.classList.toggle("selected");
            const selectedCount = document.querySelectorAll(".gallery-item.selected").length;
            downloadMultipleBtn.style.display = selectedCount > 0 ? "flex" : "none";
        });
    }

    document.querySelectorAll(".gallery-item").forEach(bindGalleryItem);

    // ======================
    // MULTIPLE DOWNLOAD
    // ======================
    downloadMultipleBtn.addEventListener("click", () => {
        const selectedImgs = Array.from(document.querySelectorAll(".gallery-item.selected img"))
                                  .map(img => img.dataset.full);
        if(!selectedImgs.length){ alert("Select at least one image!"); return; }
        const query = selectedImgs.map(u => `url=${encodeURIComponent(u)}`).join("&");
        window.location.href = `/download_multiple?${query}`;
    });

    // ======================
    // INFINITE SCROLL
    // ======================
    async function loadMore() {
        if (!nextCursor || loading) return;

        loading = true;
        loadingIndicator.style.display = "block";

        try {
            const res = await fetch(`/gallery?cursor=${nextCursor}&ajax=1`);
            const data = await res.json();

            data.urls.forEach(item => {
                const wrapper = document.createElement("div");

                if (item.type === "video") {
                    wrapper.className = "gallery-item video";
                    wrapper.innerHTML = `
                        <video controls preload="metadata">
                            <source src="${item.url}" type="video/mp4">
                        </video>
                        <input type="checkbox" class="select-img">
                    `;
                } else {
                    wrapper.className = "gallery-item image";
                    const img = document.createElement("img");
                    img.className = "lazy";
                    img.dataset.src = item.url;
                    img.dataset.full = item.url;
                    img.alt = "Wedding photo";

                    wrapper.appendChild(img);
                    wrapper.insertAdjacentHTML("beforeend",
                        `<input type="checkbox" class="select-img">`
                    );

                    lazyObserver.observe(img);
                }

                gallery.appendChild(wrapper);
                bindGalleryItem(wrapper);
            });

            nextCursor = data.next_cursor || "";
            fixLastImage();

        } catch (err) {
            console.error(err);
        }

        loadingIndicator.style.display = "none";
        loading = false;
    }

    window.addEventListener("scroll", () => {
        if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) loadMore();
    });
});
</script>
